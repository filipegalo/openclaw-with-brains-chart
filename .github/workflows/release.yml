name: Release

on:
  push:
    branches:
      - main
    paths:
      - "charts/**"

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  release:
    name: Release charts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: latest

      # -----------------------------------------------------------------------
      # Auto-bump patch version if a release tag already exists for this chart
      # -----------------------------------------------------------------------
      - name: Bump patch version if tag exists
        id: bump
        run: |
          for chart_dir in charts/*/; do
            chart_name=$(basename "$chart_dir")
            current_version=$(grep '^version:' "$chart_dir/Chart.yaml" | awk '{print $2}')
            tag="${chart_name}-${current_version}"

            if git tag --list | grep -q "^${tag}$"; then
              echo "Tag ${tag} already exists — bumping patch version"
              IFS='.' read -r major minor patch <<< "$current_version"
              new_version="${major}.${minor}.$((patch + 1))"
              sed -i "s/^version: .*/version: ${new_version}/" "$chart_dir/Chart.yaml"
              echo "Bumped ${chart_name}: ${current_version} → ${new_version}"
            else
              echo "Tag ${tag} does not exist — keeping version ${current_version}"
            fi
          done

      # -----------------------------------------------------------------------
      # Generate ArtifactHub changelog annotation
      # -----------------------------------------------------------------------
      - name: Generate ArtifactHub changelog
        run: |
          for chart_dir in charts/*/; do
            chart_name=$(basename "$chart_dir")
            chart_file="${chart_dir}/Chart.yaml"
            version=$(grep '^version:' "$chart_file" | awk '{print $2}')
            prev_tag=$(git tag --sort=-v:refname | grep "^${chart_name}-" | head -1)

            if [ -n "$prev_tag" ]; then
              log=$(git log "${prev_tag}..HEAD" --pretty=format:"- kind: changed%n  description: \"%s\"" -- "$chart_dir" | head -20)
            else
              log="$(printf '- kind: added\n  description: "Initial release"')"
            fi

            # Inject/replace the artifacthub.io/changes annotation
            python3 - "$chart_file" "$log" <<'PYEOF'
          import sys, re

          chart_file = sys.argv[1]
          changelog  = sys.argv[2]

          with open(chart_file) as f:
              content = f.read()

          annotation = f"  artifacthub.io/changes: |\n"
          for line in changelog.splitlines():
              annotation += f"    {line}\n"

          # Replace existing annotation block or append
          pattern = r'  artifacthub\.io/changes:.*?(?=\n  [^\s]|\Z)'
          if re.search(pattern, content, re.DOTALL):
              content = re.sub(pattern, annotation.rstrip(), content, flags=re.DOTALL)
          else:
              if 'annotations:' in content:
                  content = content.rstrip() + '\n' + annotation
              else:
                  content = content.rstrip() + '\nannotations:\n' + annotation

          with open(chart_file, 'w') as f:
              f.write(content)

          print(f"Updated changelog annotation in {chart_file}")
          PYEOF
          done

      # -----------------------------------------------------------------------
      # Run helm-docs and commit updated README(s)
      # -----------------------------------------------------------------------
      - name: Install helm-docs
        run: |
          HELM_DOCS_VERSION=1.14.2
          wget -qO /tmp/helm-docs.tar.gz \
            "https://github.com/norwoodj/helm-docs/releases/download/v${HELM_DOCS_VERSION}/helm-docs_${HELM_DOCS_VERSION}_Linux_x86_64.tar.gz"
          tar -xzf /tmp/helm-docs.tar.gz -C /tmp helm-docs
          sudo mv /tmp/helm-docs /usr/local/bin/helm-docs

      - name: Run helm-docs
        run: helm-docs --chart-search-root charts --log-level warning

      # -----------------------------------------------------------------------
      # Generate values.schema.json
      # -----------------------------------------------------------------------
      - name: Generate values schema
        uses: losisin/helm-values-schema-json-action@v2
        with:
          values: charts/openclaw-with-brain/values.yaml
          output: charts/openclaw-with-brain/values.schema.json

      # -----------------------------------------------------------------------
      # Commit Chart.yaml + README + values.schema.json back to main
      # -----------------------------------------------------------------------
      - name: Commit generated files
        run: |
          git add charts/*/Chart.yaml charts/*/README.md charts/*/values.schema.json
          if git diff --cached --quiet; then
            echo "No generated file changes to commit"
          else
            git commit -m "chore: update generated chart files [skip ci]"
            git push origin main
          fi

      # -----------------------------------------------------------------------
      # Import GPG key and export to legacy OpenPGP format for Helm signing
      # helm package --keyring requires the old .gpg format, not KBX
      # -----------------------------------------------------------------------
      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_KEYRING_BASE64 }}" | base64 -d | gpg --import
          # Export secret key to legacy binary OpenPGP format that Helm understands
          gpg --export-secret-keys > /tmp/secring.gpg

      # -----------------------------------------------------------------------
      # Package and sign charts
      # -----------------------------------------------------------------------
      - name: Package charts
        run: |
          mkdir -p .cr-release-packages
          for chart_dir in charts/*/; do
            helm package "$chart_dir" \
              --destination .cr-release-packages \
              --sign \
              --key "${{ secrets.GPG_KEY_NAME }}" \
              --keyring /tmp/secring.gpg
          done

      # -----------------------------------------------------------------------
      # Install chart-releaser CLI
      # -----------------------------------------------------------------------
      - name: Install chart-releaser
        run: |
          CR_VERSION=1.6.1
          wget -qO /tmp/cr.tar.gz \
            "https://github.com/helm/chart-releaser/releases/download/v${CR_VERSION}/chart-releaser_${CR_VERSION}_linux_amd64.tar.gz"
          tar -xzf /tmp/cr.tar.gz -C /tmp cr
          sudo mv /tmp/cr /usr/local/bin/cr

      # -----------------------------------------------------------------------
      # Ensure gh-pages branch exists
      # -----------------------------------------------------------------------
      - name: Create gh-pages branch if missing
        run: |
          if ! git ls-remote --exit-code --heads origin gh-pages > /dev/null 2>&1; then
            echo "gh-pages branch not found — creating orphan branch"
            git checkout --orphan gh-pages
            git reset --hard
            git commit --allow-empty -m "Initialize GitHub Pages"
            git push origin gh-pages
            git checkout main
          else
            echo "gh-pages branch already exists"
          fi

      # -----------------------------------------------------------------------
      # Generate release notes from git log since previous tag
      # Skips auto-generated commits (helm-docs, schema, sync)
      # -----------------------------------------------------------------------
      - name: Generate release notes
        run: |
          for chart_dir in charts/*/; do
            chart_name=$(basename "$chart_dir")
            prev_tag=$(git tag --sort=-v:refname | grep "^${chart_name}-" | head -1)

            {
              if [ -n "$prev_tag" ]; then
                echo "## What's Changed"
                echo ""
                git log "${prev_tag}..HEAD" \
                  --pretty=format:"- %s" \
                  | grep -v "chore: update generated chart files" \
                  | grep -v "chore: sync from" \
                  || true
                echo ""
                echo "**Full Changelog:** https://github.com/${{ github.repository }}/compare/${prev_tag}...HEAD"
              else
                echo "Initial release."
              fi
            } > /tmp/release-notes.md
          done

      # -----------------------------------------------------------------------
      # Upload chart packages as GitHub Releases
      # -----------------------------------------------------------------------
      - name: Upload charts to GitHub Releases
        run: |
          cr upload \
            --owner "${{ github.repository_owner }}" \
            --git-repo "${{ github.event.repository.name }}" \
            --token "${{ secrets.GITHUB_TOKEN }}" \
            --skip-existing

      # cr ignores --release-notes-file; use gh to set the body directly
      - name: Update release notes body
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for chart_dir in charts/*/; do
            chart_name=$(basename "$chart_dir")
            version=$(grep '^version:' "${chart_dir}/Chart.yaml" | awk '{print $2}')
            tag="${chart_name}-${version}"
            gh release edit "$tag" \
              --repo "${{ github.repository }}" \
              --notes-file /tmp/release-notes.md \
              || echo "Warning: could not update notes for $tag"
          done

      # -----------------------------------------------------------------------
      # Update Helm index on gh-pages
      # -----------------------------------------------------------------------
      - name: Update index on gh-pages
        run: |
          mkdir -p .cr-index
          cr index \
            --owner "${{ github.repository_owner }}" \
            --git-repo "${{ github.event.repository.name }}" \
            --token "${{ secrets.GITHUB_TOKEN }}" \
            --pages-branch gh-pages \
            --push

      # -----------------------------------------------------------------------
      # Push artifacthub-repo.yml to gh-pages for verified publisher status
      # Requires ARTIFACTHUB_REPO_ID secret (UUID from ArtifactHub control panel)
      # -----------------------------------------------------------------------
      - name: Push artifacthub-repo.yml to gh-pages
        env:
          ARTIFACTHUB_REPO_ID: ${{ secrets.ARTIFACTHUB_REPO_ID }}
        run: |
          if [ -z "$ARTIFACTHUB_REPO_ID" ]; then
            echo "ARTIFACTHUB_REPO_ID secret not set — skipping verified publisher setup"
            exit 0
          fi
          git fetch origin gh-pages
          git checkout gh-pages
          cat > artifacthub-repo.yml << EOF
          repositoryID: ${ARTIFACTHUB_REPO_ID}
          owners:
            - name: filipegalo
              email: fcostagalo@gmail.com
          EOF
          git add artifacthub-repo.yml
          if git diff --cached --quiet; then
            echo "artifacthub-repo.yml unchanged"
          else
            git commit -m "chore: update artifacthub-repo.yml"
            git push origin gh-pages
          fi
          git checkout main

      # -----------------------------------------------------------------------
      # Push OCI image to GHCR
      # -----------------------------------------------------------------------
      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username ${{ github.actor }} \
            --password-stdin

      - name: Push charts to GHCR
        run: |
          for pkg in .cr-release-packages/*.tgz; do
            helm push "$pkg" oci://ghcr.io/${{ github.repository_owner }}
          done
