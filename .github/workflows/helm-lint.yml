name: Helm Lint

on:
  pull_request:
    paths:
      - "charts/**"
      - ".github/workflows/helm-lint.yml"

jobs:
  lint:
    name: Lint charts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Run helm lint
        run: |
          for chart in charts/*/; do
            echo "Linting $chart"
            helm lint "$chart" --strict
          done
