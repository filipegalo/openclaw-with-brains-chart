name: Helm Docs

on:
  pull_request:
    paths:
      - "charts/**/values.yaml"
      - "charts/**/Chart.yaml"
      - ".github/workflows/helm-docs.yml"

jobs:
  helm-docs:
    name: Check helm-docs are up to date
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install helm-docs
        run: |
          HELM_DOCS_VERSION=1.14.2
          wget -qO /tmp/helm-docs.tar.gz \
            "https://github.com/norwoodj/helm-docs/releases/download/v${HELM_DOCS_VERSION}/helm-docs_${HELM_DOCS_VERSION}_Linux_x86_64.tar.gz"
          tar -xzf /tmp/helm-docs.tar.gz -C /tmp helm-docs
          sudo mv /tmp/helm-docs /usr/local/bin/helm-docs

      - name: Run helm-docs
        run: helm-docs --chart-search-root charts --log-level warning

      - name: Check for uncommitted changes
        run: |
          if ! git diff --exit-code; then
            echo ""
            echo "ERROR: helm-docs generated changes that were not committed."
            echo "Run 'helm-docs --chart-search-root charts' locally and commit the result."
            exit 1
          fi
