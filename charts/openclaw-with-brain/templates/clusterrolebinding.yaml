{{- if .Values.kubectlIntegration.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "openclaw-with-brain.fullname" . }}-readonly
  labels:
    {{- include "openclaw-with-brain.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "openclaw-with-brain.fullname" . }}-readonly
subjects:
  - kind: ServiceAccount
    name: {{ include "openclaw-with-brain.fullname" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
